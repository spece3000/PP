<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <nav>
            <ul class="navigation__list">
                <li class="navigation__list-item"><a href="profil.html"><img src="img/profil.svg" alt="кнопка профиля"></a></li>
                <li class="navigation__list-item"><a href="profil.html"><img class="back-img" src="img/back.svg" alt="назад"></a></li>
                <li><input class="search_input" placeholder="Поиск..."></li>
                <li class="navigation__list-item"><img src="img/search.svg" alt="поиск"></li>
                <li class="navigation__list-item button_sun"><img src="img/sun.svg" alt="смена темы"></li>
            </ul>
        </nav>
    </header>

    <main class="main_profil">
        <h1 class="title_name">НашХлеб</h1>
        <section class="registration-form-container">
            <h2 class="registration-title">Регистрация</h2>
            <form id="register-form" class="register-form">
                <div class="form-group">
                    <label for="reg-login">Логин</label>
                    <input type="text" id="reg-login" placeholder="Введите логин" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="example@mail.ru" required>
                </div>
                <div class="form-group">
                    <label for="reg-address">Адрес</label>
                    <input type="text" id="reg-address" placeholder="ул. Пушкина, д. 1" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Пароль (≥6 символов)</label>
                    <input type="password" id="reg-password" placeholder="******" required>
                </div>
                <div class="form-group">
                    <label for="reg-password-confirm">Подтвердите пароль</label>
                    <input type="password" id="reg-password-confirm" placeholder="******" required>
                </div>
                <button type="submit" id="reg-submit">Зарегистрироваться</button>
                <p id="reg-error" class="error-message"></p>
                <p class="login-link">Уже есть аккаунт? <a href="profil.html">Войти</a></p>
            </form>
        </section>
    </main>
    <div id="modal" class="none">
        <div class="modal_window">
            <div class="modal-content"></div>
            <button class="close_modal">закрыть</button>
        </div>
    </div>
    <!-- Модалка "Вы здесь?" -->
    <div id="modal-inactivity" class="none">
        <div class="modal_window">
            <div class="modal-content">
                <p class="modal-title">Вы здесь?</p>
                <p class="modal-text">Для продолжения работы нажмите "Да"</p>
            </div>
            <button class="modal-btn" id="inactivity-yes">Да</button>
        </div>
    </div>

    <!-- Модалка "Нет интернета" -->
    <div id="modal-offline" class="none">
        <div class="modal_window">
            <div class="modal-content">
                <p class="modal-title">Нет интернета</p>
                <p class="modal-text">Проверьте подключение к сети</p>
            </div>
            <button class="modal-btn" id="offline-retry">Да</button>
        </div>
    </div>
    <script src="js/tema.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/inactivity.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
